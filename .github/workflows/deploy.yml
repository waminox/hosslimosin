name: 🚀 Deploy to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      # The host is reached over plain FTP and we can't run shell commands
      # there, so the build step runs here and we ship the resulting
      # node_modules along with the source. All Hosslimo dependencies are
      # pure JavaScript, so a Linux build is portable to the host.
      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install production dependencies
        run: npm ci --omit=dev

      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # ftps = explicit TLS on port 21 (STARTTLS). Plain FTP often
          # fails with ECONNRESET on the data socket because the host has
          # deprecated cleartext FTP, blocks it at the firewall, or
          # advertises a private IP in the PASV response. Almost every
          # shared host that still hands out FTP credentials accepts ftps
          # on the same port.
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: ./
          # Give the data channel time on slow links / large initial sync.
          timeout: 120000
          # verbose helps diagnose the next failure if any; switch to
          # 'standard' once the deploy is stable.
          log-level: verbose
          # Files NOT to upload — and NOT to delete on the server.
          # Critical: anything in data/ or public/uploads/ is RUNTIME data
          # generated by the live server (sessions, users.json, the inquiry
          # log, the customer's edited content, uploaded media). The action
          # treats unknown remote files as "to delete" by default, so these
          # exclusions stop deploys from wiping the live state.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.htaccess
            **/.env
            **/.env.example
            **/handoff/**
            **/screenshots/**
            **/readme.md
            index.html
            data/content.json
            data/users.json
            data/inquiries.json
            data/sessions/**
            public/uploads/**
