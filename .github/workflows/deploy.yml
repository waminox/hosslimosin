name: 🚀 Deploy to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      # All Hosslimo deps are pure JavaScript, so an Ubuntu-runner build is
      # portable to the Linux host. The plain-FTP route hit ECONNRESET on the
      # data socket on every run; we now use SFTP via lftp on port 22 over
      # the host's new SSH access.
      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 Install production dependencies
        run: npm ci --omit=dev

      - name: 📂 Sync via SFTP (lftp mirror)
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: '22'
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -qq -y lftp >/dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p "$SFTP_PORT" "$SFTP_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # mirror -R = upload (reverse mirror)
          # --delete   = remove remote files not present locally (sync)
          # --exclude  = regex on the relative path; excluded paths are
          #              skipped for BOTH upload AND deletion, which is what
          #              keeps the live runtime data safe (sessions,
          #              users.json, inquiries.json, the customer's edited
          #              content.json, uploaded media). Quoted heredoc
          #              prevents shell expansion of the regex chars.
          lftp -u "$SFTP_USER,$SFTP_PASS" -p "$SFTP_PORT" "sftp://$SFTP_HOST" <<'LFTP'
          set sftp:auto-confirm yes
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set net:timeout 30
          set xfer:parallel 4
          mirror -R --delete --verbose \
            --exclude '^\.git' \
            --exclude '^\.github/' \
            --exclude '^\.htaccess$' \
            --exclude '^\.env$' \
            --exclude '^\.env\.example$' \
            --exclude '^handoff/' \
            --exclude '^screenshots/' \
            --exclude '^readme\.md$' \
            --exclude '^index\.html$' \
            --exclude '^data/content\.json$' \
            --exclude '^data/users\.json$' \
            --exclude '^data/inquiries\.json$' \
            --exclude '^data/sessions/' \
            --exclude '^public/uploads/' \
            ./ ./
          LFTP
