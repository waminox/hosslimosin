name: 🚀 Deploy to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Don't let two deploys race; queue them.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # No checkout needed on the runner — the server pulls from git itself.
      # We just need the SSH credentials to talk to the server.

      - name: 🔑 Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          install -m 644 /dev/null ~/.ssh/known_hosts
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: 🚀 Pull, install, restart on the server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -p "$SSH_PORT" \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=$HOME/.ssh/known_hosts \
              -l "$SSH_USERNAME" "$SSH_HOST" \
              'set -euo pipefail
               cd /var/www/hosslimo
               echo "── git fetch + reset to origin/main ──"
               git fetch --prune origin main
               git reset --hard origin/main
               echo "── npm ci (production deps) ──"
               npm ci --omit=dev
               echo "── restart hosslimo ──"
               sudo /bin/systemctl restart hosslimo
               sleep 2
               systemctl is-active hosslimo
               echo "── deployed $(git rev-parse --short HEAD) ──"'
