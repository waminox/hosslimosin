<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin · Hosslimo</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; min-height: 100%;
  font-family: "Inter", system-ui, -apple-system, sans-serif;
  background: #050505; color: #f1ece2;
  -webkit-font-smoothing: antialiased;
}
body {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
}
.al-card {
  width: 100%; max-width: 400px;
  background: #0e0e0e; border: 1px solid rgba(255,255,255,0.08);
  padding: 48px 40px;
}
.al-brand {
  margin-bottom: 40px; text-align: center;
}
.al-wordmark {
  font-family: "Cormorant Garamond", "Times New Roman", serif;
  font-size: 2rem; font-style: italic; font-weight: 500;
  color: #f1ece2; letter-spacing: 0.02em;
}
.al-wordmark::first-letter { color: #c9a86a; }
.al-subtitle {
  display: block; margin-top: 6px;
  font-size: 0.65rem; letter-spacing: 0.42em; text-transform: uppercase;
  color: #6f6759;
}
.al-form { display: flex; flex-direction: column; gap: 24px; }
.al-label {
  display: flex; flex-direction: column; gap: 8px;
}
.al-label span {
  font-size: 0.64rem; letter-spacing: 0.36em; text-transform: uppercase;
  color: #6f6759; font-weight: 500;
}
.al-label input {
  background: transparent; border: 0; border-bottom: 1px solid rgba(255,255,255,0.1);
  padding: 12px 0; color: #f1ece2; font: inherit; font-size: 0.95rem;
  transition: border-color 0.3s; outline: none;
}
.al-label input:focus { border-bottom-color: #c9a86a; }
.al-btn {
  margin-top: 8px; padding: 16px; background: #c9a86a; color: #0c0a06;
  border: 0; font: inherit; font-size: 0.75rem; font-weight: 600;
  letter-spacing: 0.28em; text-transform: uppercase; cursor: pointer;
  transition: background 0.3s;
}
.al-btn:hover { background: #e6cb8a; }
.al-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.al-error {
  font-size: 0.8rem; color: #d97a7a; text-align: center;
  min-height: 1.2em; margin-top: -8px;
}
</style>
</head>
<body>
<div class="al-card">
  <div class="al-brand">
    <span class="al-wordmark">Hosslimo</span>
    <span class="al-subtitle">Administrationsbereich</span>
  </div>
  <form class="al-form" id="loginForm" novalidate>
    <label class="al-label">
      <span>Benutzername</span>
      <input type="text" name="username" autocomplete="username" required spellcheck="false" />
    </label>
    <label class="al-label">
      <span>Passwort</span>
      <input type="password" name="password" autocomplete="current-password" required />
    </label>
    <p class="al-error" id="loginError" role="alert" aria-live="polite"></p>
    <button class="al-btn" type="submit" id="loginBtn">Anmelden</button>
  </form>
</div>
<script src="/js/admin-login.js" defer></script>
</body>
</html>
